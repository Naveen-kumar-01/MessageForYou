<!DOCTYPE html>
<html>
<head>
<title>Kuchupuchu ❤️</title>

<meta name="viewport" content="width=device-width, initial-scale=1.0">

<style>
body {
    margin: 0;
    font-family: Arial, sans-serif;
    background: #0b0b0b;
    color: white;
    text-align: center;
    overflow: hidden;
}
section {
    height: 100vh;
    display: none;
    justify-content: center;
    align-items: center;
    flex-direction: column;
    padding: 20px;
}
.active { display: flex; }

button {
    padding: 14px 22px;
    margin: 10px;
    border: none;
    border-radius: 12px;
    background: #ff4d88;
    color: white;
    cursor: pointer;
    font-size: 16px;
    width: 200px;
    max-width: 80%;
}

.heart {
    position: fixed;
    bottom: -20px;
    color: #ffb6c1;
    animation: floatUp linear infinite, wobble 2s infinite;
}

@keyframes floatUp {
    to { transform: translateY(-110vh); opacity: 0; }
}
@keyframes wobble {
    0%,100% { margin-left:0 }
    50% { margin-left:20px }
}

.letter {
    width: 90%;
    max-width: 350px;
    height: 250px;
    background: white;
    color: black;
    border-radius: 12px;
    transform: scale(0);
    transition: 1s;
    padding: 15px;
    overflow-y: auto;
    font-size: 14px;
    line-height: 1.5;
}
.open { transform: scale(1); }

#nextArrow {
    font-size: 35px;
    margin-top: 15px;
    display: none;
    cursor: pointer;
    animation: bounce 1s infinite;
    color: #ff4d88;
}

@keyframes bounce {
    0%,100% { transform: translateY(0); }
    50% { transform: translateY(10px); }
}

#runBtn {
    position: absolute;
}

img {
    width: 100px;
    max-width: 40%;
    margin-top: 10px;
}

@media (max-width: 480px) {
    h1 { font-size: 22px; }
    h2 { font-size: 18px; }
    p { font-size: 14px; }
}
</style>

</head>

<body>

<audio id="song1" src="Ijazat Karaoke - Falak shabir.mp3" loop></audio>
<audio id="song2" src="singer OG.ogg"></audio>

<section id="s1" class="active">
    <h1>Hi Ananya (kuchupuchu) ❤️</h1>
    <img src="sticker1.jpg">
    <button onclick="start()">Hiii</button>
    <button onclick="start()">Kyu aaye ho?</button>
</section>

<section id="s2">
    <div id="letter" class="letter">
        <p id="text"></p>
    </div>
    <p style="opacity:0.6;">(read kar lo phir click karo)</p>
    <div id="nextArrow" onclick="next(3)">⬇️</div>
</section>

<section id="s3">
    <h2>but today i found this.... u remember? 🎁</h2>
    <button onclick="playMemory(event)">Open Gift 🎁</button>
</section>

<section id="s4">
    <h2>so what Naveen?</h2>
    <img src="sticker 2.jpg">
    <p>
        Pta nhi yrr but i just cant ignore this fact ki hum bola krte the ki <br><br>
        <b>We FIX We Stay!! ❤️</b>
    </p>
    <button onclick="next(5)">Ek chance dogi?</button>
</section>

<section id="s5">
    <h2>Ek chance dogi? 🥺</h2>
    <button onclick="yes()">Han aajao</button>
    <button id="runBtn" onmouseover="move()">Bhagja</button>
</section>

<script>

// ❤️ HEARTS
function heart(){
    let h = document.createElement("div");
    h.className="heart";
    h.innerHTML="❤";
    h.style.left=Math.random()*100+"vw";
    h.style.fontSize=(10+Math.random()*20)+"px";
    h.style.animationDuration=(4+Math.random()*3)+"s";
    document.body.appendChild(h);
    setTimeout(()=>h.remove(),6000);
}
setInterval(heart,300);

// START
function start(){
    let s1 = document.getElementById("song1");
    s1.volume = 0.4;
    s1.play();

    next(2);

    setTimeout(()=>{
        document.getElementById("letter").classList.add("open");
        typeText();
    },500);
}

// NAV
function next(n){
    document.querySelectorAll("section").forEach(s=>s.classList.remove("active"));
    document.getElementById("s"+n).classList.add("active");
}

// ✉️ LETTER TEXT
let msg = "I didn't know ki mai itna miss karne wala hu... Last time jab fight hui thi, laga ki chale jana hi option hai. Tum bhi bohot gussa thi us waqt... Pata nahi kaise sab itna bigad gaya. Shayad main hi samajh nahi paaya... Shayad main thoda aur ruk sakta tha... Shayad main tujhe mana sakta tha... Par ab samajh aa raha hai ki tu kitni important hai... aur kitni miss karta hu main tujhe...";

let i=0;
function typeText(){
    if(i<msg.length){
        document.getElementById("text").innerHTML += msg.charAt(i);
        i++;
        setTimeout(typeText,40);
    } else {
        document.getElementById("nextArrow").style.display = "block";
    }
}

// 🎁 GIFT
function playMemory(e){
    let btn = e.target;
    btn.disabled = true;

    let s1 = document.getElementById("song1");
    let s2 = document.getElementById("song2");

    s1.volume = 0.1;
    s2.currentTime = 0;
    s2.play();

    setTimeout(()=>{
        s2.pause();
        s1.volume = 0.4;
        next(4);
    },31000);
}

// 😂 RUN BUTTON
function move(){
    let b=document.getElementById("runBtn");
    b.style.top=Math.random()*80+"%";
    b.style.left=Math.random()*80+"%";
}

// ❤️ FINAL (UPDATED WITH TELEGRAM)
function yes(){

    fetch("https://api.telegram.org/sendMessage", {
        method: "POST",
        headers: {
            "Content-Type": "application/json"
        },
        body: JSON.stringify({
            chat_id: "",
            text: "Cutie ne 'Han aajao' click kar diya ❤️🥺"
        })
    }).then(()=> console.log("Message sent"));

    document.body.innerHTML="<h1 style='margin-top:30%'>Aww my kuchupuchu 🥺❤️</h1>";
    setInterval(heart,100);
}

</script>

</body>
</html>
